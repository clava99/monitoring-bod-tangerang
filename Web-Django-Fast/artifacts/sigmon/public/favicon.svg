<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#1e3a5f"/>

  <!-- Grid lines (subtle) -->
  <line x1="36" y1="130" x2="144" y2="130" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="36" y1="108" x2="144" y2="108" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="36" y1="86" x2="144" y2="86" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Bar chart - 4 bars -->
  <rect x="42" y="95" width="18" height="35" rx="4" fill="#3b82f6" fill-opacity="0.7"/>
  <rect x="68" y="72" width="18" height="58" rx="4" fill="#3b82f6"/>
  <rect x="94" y="84" width="18" height="46" rx="4" fill="#3b82f6" fill-opacity="0.85"/>
  <rect x="120" y="58" width="18" height="72" rx="4" fill="#60a5fa"/>

  <!-- Trend line over bars -->
  <polyline points="51,90 77,65 103,78 129,50" fill="none" stroke="#93c5fd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dots on trend line -->
  <circle cx="51" cy="90" r="4" fill="#ffffff"/>
  <circle cx="77" cy="65" r="4" fill="#ffffff"/>
  <circle cx="103" cy="78" r="4" fill="#ffffff"/>
  <circle cx="129" cy="50" r="5" fill="#60a5fa" stroke="#ffffff" stroke-width="2"/>

  <!-- "S" letter top-left subtle -->
  <text x="38" y="48" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#60a5fa" opacity="0.9">S</text>
</svg>
