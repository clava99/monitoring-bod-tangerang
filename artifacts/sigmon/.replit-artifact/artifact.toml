kind = "web"
previewPath = "/"
title = "SIGMON Dashboard"
version = "1.0.0"
id = "artifacts/sigmon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25546

[services.development]
run = "pnpm --filter @workspace/sigmon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sigmon", "run", "build" ]
publicDir = "artifacts/sigmon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
